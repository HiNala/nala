<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nala — Code Intelligence Dashboard</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a12;color:#e0e0f0;font-family:'JetBrains Mono','Fira Code',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
    /* Header */
    header{padding:10px 20px;background:#14141e;border-bottom:1px solid #1e1e30;display:flex;align-items:center;gap:16px;flex-shrink:0}
    header h1{font-size:1.1rem;color:#00d4d4;font-weight:700;letter-spacing:0.05em}
    header .sep{color:#333}
    #proj-root{font-size:0.75rem;color:#555;flex:1}
    /* Tabs */
    #tabs{display:flex;gap:0;background:#0f0f1a;border-bottom:1px solid #1e1e30;flex-shrink:0}
    .tab{padding:8px 20px;font-size:0.8rem;color:#555;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
    .tab:hover{color:#a0a0c0}
    .tab.active{color:#00d4d4;border-bottom-color:#00d4d4}
    /* Controls bar */
    #controls{padding:6px 20px;background:#10101a;border-bottom:1px solid #1a1a28;display:flex;gap:10px;align-items:center;flex-shrink:0;flex-wrap:wrap}
    button{background:#1a1a2e;color:#a0a0c0;border:1px solid #2a2a50;padding:3px 10px;border-radius:3px;cursor:pointer;font-size:0.75rem;font-family:inherit}
    button:hover{background:#22223a;color:#00d4d4;border-color:#00d4d4}
    input[type=text],input[type=number]{background:#12121e;color:#c0c0e0;border:1px solid #2a2a50;padding:3px 8px;border-radius:3px;font-size:0.75rem;font-family:inherit;width:160px}
    input::placeholder{color:#444}
    #stats{font-size:0.72rem;color:#444;margin-left:auto}
    /* Panels */
    #panels{flex:1;overflow:hidden;position:relative}
    .panel{position:absolute;inset:0;display:none;overflow:auto}
    .panel.active{display:block}
    /* Graph panel */
    #panel-graph{overflow:hidden}
    #graph-svg{width:100%;height:100%}
    .node circle{stroke-width:1.5px;cursor:pointer;transition:r .1s}
    .node.File circle{fill:#1a3a5c;stroke:#2e86c1}
    .node.Function circle{fill:#1a4a2e;stroke:#27ae60}
    .node.Class circle{fill:#4a3a10;stroke:#f1c40f}
    .node text{font-size:8px;fill:#666;pointer-events:none;user-select:none}
    .node.highlighted circle{stroke:#00d4d4;stroke-width:2.5px}
    .link{stroke:#1e1e30;stroke-opacity:0.7}
    .link.CALLS{stroke:#27ae60;stroke-opacity:0.5}
    .link.IMPORTS{stroke:#2980b9;stroke-opacity:0.5}
    .link.CONTAINS{stroke:#333;stroke-opacity:0.4;stroke-dasharray:3}
    /* Tooltip */
    #tooltip{position:fixed;background:#1a1a2e;border:1px solid #2a2a50;padding:8px 12px;border-radius:4px;font-size:0.75rem;pointer-events:none;display:none;color:#c0c0e0;max-width:280px;z-index:100;line-height:1.5}
    /* Table panels */
    .data-table{width:100%;border-collapse:collapse;font-size:0.75rem}
    .data-table th{position:sticky;top:0;background:#14141e;color:#777;font-weight:500;text-align:left;padding:8px 12px;border-bottom:1px solid #1e1e30;cursor:pointer;user-select:none}
    .data-table th:hover{color:#00d4d4}
    .data-table td{padding:6px 12px;border-bottom:1px solid #0f0f18;color:#b0b0c8;word-break:break-all}
    .data-table tr:hover td{background:#0f0f1c}
    .sev{display:inline-block;padding:1px 6px;border-radius:3px;font-size:0.65rem;font-weight:600;text-transform:uppercase}
    .sev.critical{background:#3d0000;color:#ff4444}
    .sev.high{background:#2d1500;color:#ff8800}
    .sev.medium{background:#2d2d00;color:#ffdd00}
    .sev.low{background:#002d1a;color:#44ff88}
    .sev.info{background:#001a2d;color:#44aaff}
    /* Empty state */
    .empty{padding:40px;color:#333;text-align:center;font-size:0.85rem}
  </style>
</head>
<body>
  <header>
    <h1>nala</h1>
    <span class="sep">|</span>
    <span style="color:#555;font-size:0.8rem">code intelligence dashboard</span>
    <span id="proj-root"></span>
  </header>

  <div id="tabs">
    <div class="tab active" data-tab="graph">Graph</div>
    <div class="tab" data-tab="complexity">Complexity</div>
    <div class="tab" data-tab="findings">Findings</div>
    <div class="tab" data-tab="files">Files</div>
  </div>

  <div id="controls">
    <!-- Graph controls -->
    <span id="ctrl-graph">
      <button onclick="loadGraph()">Refresh</button>
      <button onclick="filterNodes('all')">All</button>
      <button onclick="filterNodes('File')">Files</button>
      <button onclick="filterNodes('Function')">Functions</button>
      <input type="text" id="search-input" placeholder="Search nodes…" oninput="searchNodes(this.value)" />
    </span>
    <!-- Complexity controls -->
    <span id="ctrl-complexity" style="display:none">
      <label style="font-size:0.75rem;color:#555">Min CC: </label>
      <input type="number" id="cc-threshold" value="5" min="1" max="100" style="width:60px" />
      <button onclick="loadComplexity()">Load</button>
    </span>
    <!-- Findings controls -->
    <span id="ctrl-findings" style="display:none">
      <button onclick="loadFindings()">Refresh</button>
      <label style="font-size:0.75rem;color:#555">Session: </label>
      <input type="text" id="session-id" placeholder="latest" style="width:180px" />
    </span>
    <!-- Files controls -->
    <span id="ctrl-files" style="display:none">
      <button onclick="loadFiles()">Refresh</button>
    </span>
    <span id="stats"></span>
  </div>

  <div id="panels">
    <div id="panel-graph" class="panel active"></div>
    <div id="panel-complexity" class="panel"></div>
    <div id="panel-findings" class="panel"></div>
    <div id="panel-files" class="panel"></div>
  </div>

  <div id="tooltip"></div>
  <script src="/static/graph.js"></script>
  <script src="/static/complexity.js"></script>
  <script src="/static/findings.js"></script>
  <script src="/static/files.js"></script>
  <script>
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        ['ctrl-graph','ctrl-complexity','ctrl-findings','ctrl-files'].forEach(id => {
          document.getElementById(id).style.display = 'none';
        });
        tab.classList.add('active');
        const name = tab.dataset.tab;
        document.getElementById('panel-' + name).classList.add('active');
        document.getElementById('ctrl-' + name).style.display = '';
        document.getElementById('stats').textContent = '';
        if (name === 'graph') loadGraph();
        else if (name === 'complexity') loadComplexity();
        else if (name === 'findings') loadFindings();
        else if (name === 'files') loadFiles();
      });
    });

    // Show project root from URL param
    const params = new URLSearchParams(location.search);
    const root = params.get('root') || '.';
    document.getElementById('proj-root').textContent = root !== '.' ? root : '';

    // Initial load
    window.addEventListener('load', loadGraph);
  </script>
</body>
</html>
